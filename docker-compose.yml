services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-cc-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_cc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_cc"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-cc-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/smart_cc
      ENVIRONMENT: development
      DEBUG: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_NARRATIVE_MODEL: ${AI_NARRATIVE_MODEL:-gpt-4o}
      AI_NARRATIVE_ENABLED: ${AI_NARRATIVE_ENABLED:-true}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: smart-cc-adminer
    ports:
      - "9001:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
