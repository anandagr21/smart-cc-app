<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1920px;
    overflow: hidden;
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
  }
  .bg {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, #0f172a 0%, #1e1b4b 50%, #020617 100%);
  }
  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 30%, transparent 70%);
  }
  .phone {
    position: relative; z-index: 1;
    width: 420px; height: 860px;
    background: #0f172a;
    border-radius: 48px;
    border: 3px solid #334155;
    box-shadow: 0 0 80px rgba(139,92,246,0.15), 0 0 200px rgba(59,130,246,0.08);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .phone img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 45px;
  }
  .caption {
    position: relative; z-index: 1;
    background: rgba(15,23,42,0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px 36px;
    text-align: center;
    max-width: 640px;
  }
  .caption h2 {
    font-size: 30px; font-weight: 800;
    color: #fff;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .caption p {
    font-size: 20px; font-weight: 500;
    color: #94a3b8;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg"></div>
  <div class="bg-grid"></div>
  <div class="phone">
    <img src="./viewable/02-wallet.jpg" alt="" />
  </div>
  <div class="caption">
    <h2>Your Card Wallet</h2>
    <p>Track 79 Indian credit cards from 20+ banks</p>
  </div>
</body>
</html>
