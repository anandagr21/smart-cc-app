<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Feature Graphic — Card Analyser</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    background: #060F1A;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(20,184,166,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(20,184,166,0.04) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 70%);
  }

  .glow-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
  }
  .glow-teal {
    width: 500px; height: 500px;
    background: #14B8A6;
    opacity: 0.12;
    top: -180px; left: -160px;
  }
  .glow-amber {
    width: 400px; height: 400px;
    background: #F59E0B;
    opacity: 0.08;
    bottom: -150px; right: -100px;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 56px;
    padding: 0 64px;
  }

  .icon-wrap {
    flex-shrink: 0;
    width: 180px;
    height: 180px;
    border-radius: 40px;
    background: rgba(20,184,166,0.06);
    border: 1px solid rgba(20,184,166,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 80px rgba(20,184,166,0.08);
  }
  .icon-wrap img {
    width: 100px;
    height: 100px;
    border-radius: 20px;
  }

  .text-block {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  h1 {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.1;
    color: #fff;
  }
  h1 .highlight {
    background: linear-gradient(125deg, #2DD4BF 0%, #14B8A6 40%, #F59E0B 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub {
    font-size: 22px;
    font-weight: 500;
    color: #94a3b8;
    letter-spacing: -0.01em;
  }

  .brand-line {
    position: absolute;
    bottom: 32px;
    left: 64px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-line img {
    width: 32px;
    height: 32px;
    border-radius: 8px;
  }
  .brand-line span {
    font-size: 16px;
    font-weight: 700;
    color: rgba(20,184,166,0.5);
    letter-spacing: 0.02em;
  }

  .tagline-row {
    position: absolute;
    bottom: 32px;
    right: 64px;
    display: flex;
    gap: 24px;
  }
  .tag {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tag-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-orb glow-teal"></div>
  <div class="glow-orb glow-amber"></div>

  <div class="content">
    <div class="icon-wrap">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%232DD4BF'/%3E%3Cstop offset='100%25' style='stop-color:%2314B8A6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='24' fill='url(%23g)'/%3E%3Cpath d='M30 55 L45 70 L70 35' stroke='white' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" alt="Card Analyser" />
    </div>
    <div class="text-block">
      <h1>Which card for <span class="highlight">Swiggy? Fuel? Amazon?</span></h1>
      <p class="sub">Stop guessing. Start optimizing.</p>
    </div>
  </div>

  <div class="brand-line">
    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%232DD4BF'/%3E%3Cstop offset='100%25' style='stop-color:%2314B8A6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='24' fill='url(%23g)'/%3E%3Cpath d='M30 55 L45 70 L70 35' stroke='white' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" alt="" />
    <span>Card Analyser</span>
  </div>

  <div class="tagline-row">
    <div class="tag"><span class="tag-dot" style="background:#2DD4BF"></span>79 Indian Cards</div>
    <div class="tag"><span class="tag-dot" style="background:#14B8A6"></span>Auto Rule Updates</div>
    <div class="tag"><span class="tag-dot" style="background:#F59E0B"></span>AI-Powered</div>
  </div>
</body>
</html>
